<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 text-gray-800 font-sans">
    <nav
      class="bg-emerald-600 p-4 shadow-md text-white flex justify-between items-center mb-8"
    >
      <h1 class="text-2xl font-bold">Task Manager</h1>
      <a
        href="create.html"
        class="bg-white text-emerald-600 px-4 py-2 rounded font-semibold hover:bg-emerald-50 transition"
      >
        + New Task
      </a>
    </nav>

    <div class="max-w-4xl mx-auto px-4">
      <div
        class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 mb-6 flex flex-wrap gap-4 items-center"
      >
        <span class="font-semibold text-gray-600">Filters:</span>
        <select
          id="filter-priority"
          class="p-2 border rounded outline-none focus:ring-2 focus:ring-emerald-400"
        >
          <option value="all">All Priorities</option>
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
        <input
          type="date"
          id="filter-date"
          class="p-2 border rounded outline-none focus:ring-2 focus:ring-emerald-400"
        />
        <button
          id="clear-filters"
          class="text-sm text-gray-500 hover:text-red-500 font-medium"
        >
          Clear Filters
        </button>
      </div>

      <div id="task-list" class="space-y-4 pb-10">
        <p class="text-gray-500 text-center py-4">Loading tasks...</p>
      </div>
    </div>

    <template id="task-card-template">
      <div
        id="card-container"
        class="p-5 rounded-xl shadow-sm border-l-4 flex justify-between items-center bg-white transition-all"
      >
        <div>
          <h3 class="task-title text-lg font-bold text-gray-800"></h3>
          <p class="task-desc text-sm text-gray-500 mt-1"></p>
          <div class="mt-3 text-xs font-semibold flex gap-2 text-gray-600">
            <span
              class="task-due bg-gray-100 px-2.5 py-1 rounded-md flex items-center gap-1"
            ></span>
            <span
              class="task-priority bg-gray-100 px-2.5 py-1 rounded-md capitalize"
            ></span>
          </div>
        </div>
        <div class="flex gap-2">
          <button
            class="toggle-btn px-3 py-1.5 bg-emerald-100 text-emerald-700 rounded font-semibold hover:bg-emerald-200 transition"
          ></button>
          <button
            class="delete-btn px-3 py-1.5 bg-red-50 text-red-600 rounded font-semibold hover:bg-red-100 transition"
          >
            Delete
          </button>
        </div>
      </div>
    </template>

    <script src="client.js"></script>
  </body>
</html>
